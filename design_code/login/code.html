<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>TailorMaster | Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "background": "#f8f9fa",
                    "surface-container-high": "#e5e9eb",
                    "on-primary": "#f5f9ff",
                    "on-primary-fixed-variant": "#2a5975",
                    "tertiary-fixed-dim": "#bbc1ef",
                    "primary-fixed-dim": "#a1cfef",

                    "primary-dim": "#285874",
                    "surface-bright": "#f8f9fa",
                    "on-tertiary-container": "#3e456c",
                    "secondary-fixed": "#d1e6f0",
                    "tertiary-container": "#c9cffe",
                    "on-primary-container": "#1e4f6b",
                    "secondary": "#4f626b",
                    "on-tertiary": "#faf8ff",
                    "tertiary-fixed": "#c9cffe",
                    "on-primary-fixed": "#003c57",
                    "inverse-surface": "#0c0f10",
                    "error-dim": "#67040d",
                    "surface-dim": "#d5dbdd",
                    "on-error": "#fff7f6",
                    "primary": "#366480",
                    "on-tertiary-fixed-variant": "#484e76",
                    "on-background": "#2d3335",
                    "on-secondary-fixed": "#2f424a",
                    "outline": "#767c7e",
                    "secondary-dim": "#43565f",
                    "surface-container-highest": "#dee3e6",
                    "surface": "#f8f9fa",
                    "on-secondary-container": "#41545d",
                    "tertiary": "#565d85",
                    "error-container": "#fa746f",
                    "on-error-container": "#6e0a12",
                    "surface-container": "#ebeef0",
                    "on-surface-variant": "#5a6062",
                    "on-surface": "#2d3335",
                    "secondary-fixed-dim": "#c3d8e2",
                    "tertiary-dim": "#4a5178",
                    "primary-container": "#afddfe",
                    "on-secondary": "#f2faff",
                    "surface-container-lowest": "#ffffff",
                    "inverse-on-surface": "#9b9d9e",
                    "outline-variant": "#adb3b5",
                    "on-tertiary-fixed": "#2b3257",
                    "inverse-primary": "#afddfe",
                    "on-secondary-fixed-variant": "#4b5e67",
                    "surface-container-low": "#f1f4f5",
                    "primary-fixed": "#afddfe",
                    "error": "#a83836",
                    "surface-tint": "#366480"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "fontFamily": {
                    "headline": ["Inter"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-surface text-on-background min-h-screen flex items-center justify-center p-6">
<div class="w-full max-w-5xl grid grid-cols-1 md:grid-cols-12 bg-surface-container-lowest overflow-hidden shadow-[0px_24px_48px_rgba(45,51,53,0.06)] border border-outline-variant/10">
<!-- Left Panel: Brand Imagery (Editorial Style) -->
<div class="hidden md:flex md:col-span-7 relative flex-col justify-between p-12 bg-primary overflow-hidden">
<div class="relative z-10">
<span class="text-on-primary font-black text-2xl tracking-tight">TailorMaster</span>
</div>
<div class="relative z-10">
<h1 class="text-on-primary text-5xl font-black leading-tight mb-6 tracking-tighter">Precision in Every Stitch.</h1>
<p class="text-primary-container text-lg max-w-md font-medium opacity-90 leading-relaxed">
                    Access your bespoke dashboard and manage patterns, measurements, and staff with surgical precision.
                </p>
</div>
<div class="absolute inset-0 z-0">
<img class="w-full h-full object-cover opacity-40 mix-blend-multiply" data-alt="Close-up of a high-end bespoke navy suit jacket on a wooden hanger with soft dramatic lighting showing fabric texture" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCXkg8-wi7DJRWiZbeqttD9VV-w8iMAg6in-LpSJU_oeGqKRqlFJ80eK7SyTKM5SZD5tyLNp8_pJdIBWT_-zagLog_IUKVI-k0ARjvO9O0G1w9vBxnci_Eo95aOXmmwPWGqF8bX2kIqzKkyws92XoU9ooaHUV5i3nzvxAExbDRhAXP6sRxntXeV_tznI2wltuQUxGszZI5_Pe0OyHhSmnmN-30eB_yfz2MeMdPQbVGlso4qE6DBko4hguWJ8yjEDpsGFVHvDOYDAA"/>
</div>
<!-- Floating Decorative Element -->
<div class="absolute -right-20 bottom-20 w-64 h-64 border-[1px] border-on-primary/10 rounded-full"></div>
<div class="absolute -right-10 bottom-10 w-64 h-64 border-[1px] border-on-primary/20 rounded-full"></div>
</div>
<!-- Right Panel: Login Form -->
<div class="col-span-1 md:col-span-5 flex flex-col justify-center p-8 md:p-16 lg:p-20 bg-surface-container-lowest">
<!-- Mobile Header -->
<div class="md:hidden mb-12">
<span class="text-primary font-black text-xl tracking-tight">TailorMaster</span>
</div>
<div class="mb-12">
<h2 class="text-3xl font-black text-on-background tracking-tighter mb-2">Welcome Back</h2>
<p class="text-on-surface-variant text-sm font-medium">Continue to your master pattern</p>
</div>
<form class="space-y-8">
<!-- Email Field -->
<div class="space-y-2">
<label class="text-primary font-bold text-xs tracking-widest uppercase" for="email">Email</label>
<div class="relative group">
<input class="w-full bg-surface-container-highest border-none p-4 text-on-background placeholder:text-outline/50 focus:ring-0 focus:bg-surface-container-lowest transition-all border-b-2 border-transparent focus:border-primary" id="email" name="email" placeholder="master@tailormaster.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="text-primary font-bold text-xs tracking-widest uppercase" for="password">Password</label>
<a class="text-on-surface-variant hover:text-primary text-xs font-semibold transition-colors" href="#">Forgot?</a>
</div>
<div class="relative group">
<input class="w-full bg-surface-container-highest border-none p-4 text-on-background placeholder:text-outline/50 focus:ring-0 focus:bg-surface-container-lowest transition-all border-b-2 border-transparent focus:border-primary" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center space-x-3">
<input class="w-4 h-4 rounded-sm border-outline-variant text-primary focus:ring-primary/20" id="remember" type="checkbox"/>
<label class="text-on-surface-variant text-xs font-medium" for="remember">Keep me logged in</label>
</div>
<!-- Primary Action -->
<div class="pt-4">
<button class="w-full bg-gradient-to-br from-primary to-primary-dim text-on-primary py-4 px-6 font-bold text-sm tracking-widest uppercase hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
<span>Login</span>
<span class="material-symbols-outlined text-base">arrow_forward</span>
</button>
</div>
</form>
<div class="mt-12 text-center">
<p class="text-on-surface-variant text-xs font-medium">
                    New to the shop? 
                    <a class="text-primary font-bold hover:underline ml-1" href="#">Create an account</a>
</p>
</div>
<!-- Technical/Utility Footer -->
<div class="mt-auto pt-12 flex items-center justify-between border-t border-surface-variant/50">
<span class="text-[10px] text-outline font-medium tracking-tighter">v2.4.0-Bespoke</span>
<div class="flex space-x-4">
<span class="material-symbols-outlined text-outline text-sm">security</span>
<span class="material-symbols-outlined text-outline text-sm">language</span>
</div>
</div>
</div>
</div>
<!-- Background Decoration (Subtle) -->
<div class="fixed top-0 left-0 w-full h-full pointer-events-none -z-10 overflow-hidden">
<div class="absolute top-[-10%] right-[-5%] w-[40%] h-[60%] bg-secondary-container/20 blur-[120px] rounded-full"></div>
<div class="absolute bottom-[-10%] left-[-5%] w-[40%] h-[60%] bg-primary-container/10 blur-[120px] rounded-full"></div>
</div>
</body></html>
